<div
                id="cibLinkModal"
                class="fixed inset-0 bg-black bg-opacity-50 hidden z-50 p-4 overflow-y-auto"
            >
                <div class="flex items-center justify-center min-h-full">
                    <div class="bg-white dark:bg-gray-800 rounded-lg shadow-xl max-w-2xl w-full">
                        <div class="p-content border-b border-gray-200 dark:border-gray-700">
                            <div class="flex justify-between items-center">
                                <h2 id="cibLinkModalTitle" class="text-xl font-bold">
                                    Добавить ссылку 1С
                                </h2>
                                <div class="flex items-center gap-1">
                                    <button
                                        type="button"
                                        id="cibLinkModalUndoBtn"
                                        disabled
                                        class="inline-block p-2 text-gray-500 hover:text-gray-700 dark:text-gray-400 dark:hover:text-gray-200 rounded hover:bg-gray-100 dark:hover:bg-gray-700 transition-colors disabled:opacity-40 disabled:cursor-not-allowed disabled:hover:bg-transparent"
                                        title="Предыдущая сохранённая версия (Ctrl+Shift+U)"
                                        aria-label="Откат к предыдущей сохранённой версии"
                                    >
                                        <i class="fas fa-undo" aria-hidden="true"></i>
                                    </button>
                                    <button
                                        type="button"
                                        id="cibLinkModalRedoBtn"
                                        disabled
                                        class="inline-block p-2 text-gray-500 hover:text-gray-700 dark:text-gray-400 dark:hover:text-gray-200 rounded hover:bg-gray-100 dark:hover:bg-gray-700 transition-colors disabled:opacity-40 disabled:cursor-not-allowed disabled:hover:bg-transparent"
                                        title="Следующая сохранённая версия (Ctrl+Shift+R)"
                                        aria-label="Повтор отменённой версии"
                                    >
                                        <i class="fas fa-redo" aria-hidden="true"></i>
                                    </button>
                                <button
                                    class="close-modal p-2 text-gray-500 hover:text-gray-700 dark:text-gray-400 dark:hover:text-gray-200 rounded hover:bg-gray-100 dark:hover:bg-gray-700 transition-colors"
                                    title="Закрыть"
                                >
                                    <i class="fas fa-times text-xl"></i>
                                </button>
                                </div>
                            </div>
                        </div>
