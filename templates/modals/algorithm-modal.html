<div
                id="algorithmModal"
                class="fixed inset-0 bg-black bg-opacity-50 hidden z-50 overflow-y-auto p-4"
            >
                <div class="flex items-center justify-center min-h-full py-6">
                    <div class="bg-white dark:bg-gray-800 rounded-lg shadow-xl max-w-7xl w-full">
                        <div class="p-content border-b border-gray-200 dark:border-gray-700">
                            <div
                                class="flex flex-col sm:flex-row sm:justify-between sm:items-center gap-4"
                            >
                                <h2 id="modalTitle" class="text-2xl font-bold">
                                    Название алгоритма
                                </h2>
                                <div
                                    class="modal-algorithm-toolbar algorithm-modal-toolbar-inner flex flex-wrap items-center justify-end gap-x-0.5 gap-y-1.5 sm:flex-nowrap sm:gap-x-1 flex-shrink-0"
                                >
                                    <button
                                        id="deleteAlgorithmBtn"
                                        type="button"
                                        class="algorithm-modal-toolbar-icon-btn inline-flex h-10 w-10 shrink-0 items-center justify-center rounded-lg text-red-600 hover:bg-red-50 dark:text-red-400 dark:hover:bg-red-950/40 transition-colors focus:outline-none focus-visible:ring-2 focus-visible:ring-red-500/30"
                                        title="Удалить"
                                        aria-label="Удалить алгоритм"
                                    >
                                        <i class="fas fa-trash text-base leading-none" aria-hidden="true"></i>
                                    </button>
                                    <button
                                        id="editAlgorithmBtn"
                                        type="button"
                                        class="algorithm-modal-toolbar-icon-btn inline-flex h-10 w-10 shrink-0 items-center justify-center rounded-lg text-gray-600 hover:bg-gray-100 dark:text-gray-300 dark:hover:bg-gray-700 transition-colors focus:outline-none focus-visible:ring-2 focus-visible:ring-primary/30"
                                        title="Редактировать"
                                        aria-label="Редактировать алгоритм"
                                    >
                                        <i class="fas fa-edit text-base leading-none" aria-hidden="true"></i>
                                    </button>
                                    <span
                                        class="algorithm-modal-toolbar-rule h-10 w-px shrink-0 self-center bg-gray-300 dark:bg-gray-600"
                                        aria-hidden="true"
                                    ></span>
                                    <div
                                        class="export-btn-placeholder-modal flex h-10 w-10 shrink-0 items-center justify-center"
                                        aria-hidden="false"
                                    ></div>
                                    <div
                                        class="fav-btn-placeholder-modal flex h-10 w-10 shrink-0 items-center justify-center"
                                        aria-hidden="false"
                                    ></div>
                                    <button
                                        id="startStepExecutionBtn"
                                        class="algorithm-modal-toolbar-execute inline-flex h-10 shrink-0 items-center justify-center gap-2 rounded-lg bg-indigo-600 px-3.5 text-sm font-medium text-white shadow-sm transition hover:bg-indigo-700 focus:outline-none focus-visible:ring-2 focus-visible:ring-indigo-400/50 dark:hover:bg-indigo-600"
                                        type="button"
                                        title="Выполнить по шагам"
                                        aria-label="Выполнить алгоритм по шагам"
                                    >
                                        <i class="fas fa-play text-sm leading-none opacity-95" aria-hidden="true"></i>
                                        <span class="leading-none">Выполнить</span>
                                    </button>
                                    <span
                                        class="algorithm-modal-toolbar-rule h-10 w-px shrink-0 self-center bg-gray-300 dark:bg-gray-600"
                                        aria-hidden="true"
                                    ></span>
                                    <button
                                        id="toggleFullscreenViewBtn"
                                        type="button"
                                        class="algorithm-modal-toolbar-icon-btn inline-flex h-10 w-10 shrink-0 items-center justify-center rounded-lg text-gray-500 hover:bg-gray-100 hover:text-gray-800 dark:text-gray-400 dark:hover:bg-gray-700 dark:hover:text-gray-100 transition-colors focus:outline-none focus-visible:ring-2 focus-visible:ring-primary/25"
                                        title="Развернуть на весь экран"
                                        aria-label="Развернуть на весь экран"
                                    >
                                        <i class="fas fa-expand text-base leading-none" aria-hidden="true"></i>
                                    </button>
                                    <button
                                        id="closeModalBtn"
                                        type="button"
                                        class="algorithm-modal-toolbar-icon-btn inline-flex h-10 w-10 shrink-0 items-center justify-center rounded-lg text-gray-500 hover:bg-gray-100 hover:text-gray-800 dark:text-gray-400 dark:hover:bg-gray-700 dark:hover:text-gray-100 transition-colors focus:outline-none focus-visible:ring-2 focus-visible:ring-primary/25"
                                        title="Закрыть"
                                        aria-label="Закрыть окно"
                                    >
                                        <i class="fas fa-times text-base leading-none" aria-hidden="true"></i>
                                    </button>
                                </div>
                            </div>
